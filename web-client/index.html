<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beam</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <meta name="theme-color" content="#0a0a0a" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #6b6b6b;
      --line: #202020;
      --success: #6bcf9a;
      --error: #e17a7a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px 48px;
      background: var(--bg);
      color: var(--fg);
    }
    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 32px;
    }
    section { margin-bottom: 28px; }
    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 14px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input {
      font-size: 14px;
      padding: 9px 0;
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
    }
    input:focus { outline: none; border-bottom-color: var(--fg); }
    input::placeholder { color: #4a4a4a; }
    button {
      font-size: 13px;
      padding: 9px 12px;
      width: 100%;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--line);
      margin-top: 16px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { border-color: var(--fg); }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { min-height: 20px; color: var(--muted); font-size: 12px; text-align: center; margin-top: 20px; }
    #status.success { color: var(--success); }
    #status.error { color: var(--error); }

    /* "Swept away" once paired — collapses rather than just hiding, so the
       transition itself communicates "you're set up now." */
    #pair-section {
      overflow: hidden;
      max-height: 400px;
      opacity: 1;
      transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
    }
    #pair-section.collapsed {
      max-height: 0;
      opacity: 0;
      margin-bottom: 0;
      pointer-events: none;
    }
    #paired-banner { display: none; color: var(--success); font-size: 12px; margin-bottom: 8px; }
    #repair-link {
      display: none;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      cursor: pointer;
    }
    #repair-link:hover { color: var(--fg); }
  </style>
</head>
<body>
  <h1>Beam</h1>

  <section id="pair-section">
    <p class="section-title">Pair this device</p>
    <label>Relay URL<input id="relay-url" placeholder="https://your-relay.example.com" /></label>
    <label>Pairing code (shown on your PC)<input id="pairing-code" placeholder="ABC123" maxlength="6" /></label>
    <button id="pair-btn">Pair</button>
  </section>

  <div id="paired-banner">Paired with your computer</div>
  <section id="share-section">
    <p class="section-title">Send to your PC</p>
    <label>Link<input id="link-url" placeholder="https://example.com" /></label>
    <button id="send-link-btn">Send link</button>
    <label>Photo<input id="photo-file" type="file" accept="image/*" /></label>
    <button id="send-photo-btn">Send photo</button>
  </section>

  <div id="status"></div>
  <div id="repair-link">Pair a different device</div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
