<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beam</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <meta name="theme-color" content="#2563eb" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #191c22;
      --fg: #f2f3f5;
      --muted: #9aa1ac;
      --accent: #2563eb;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      max-width: 460px;
      margin: 0 auto;
      padding: 32px 16px 48px;
      background: var(--bg);
      color: var(--fg);
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    h1 { font-size: 1.3rem; margin: 0; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 18px;
      padding: 18px 18px 20px;
    }
    .card-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 14px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input {
      font-size: 1rem;
      padding: 10px 12px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      background: #10131a;
      border: 1px solid #2a2e38;
      border-radius: 8px;
      color: var(--fg);
    }
    input::placeholder { color: #6b7280; }
    button {
      font-size: 1rem;
      padding: 10px 12px;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { min-height: 24px; color: var(--muted); font-size: 14px; text-align: center; }
    #status.success { color: var(--success); }
    #status.error { color: var(--error); }
    #paired-banner {
      display: none;
      color: var(--success);
      background: rgba(52, 211, 153, 0.12);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 18px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="badge">📡</div>
    <h1>Beam</h1>
  </div>
  <div id="paired-banner">✓ Paired with your computer</div>

  <div class="card" id="pair-section">
    <p class="card-title">Pair this device</p>
    <label>Relay URL<input id="relay-url" placeholder="https://your-relay.example.com" /></label>
    <label>Pairing code (shown on your PC)<input id="pairing-code" placeholder="ABC123" maxlength="6" /></label>
    <button id="pair-btn">Pair</button>
  </div>

  <div class="card" id="share-section">
    <p class="card-title">Send to your PC</p>
    <label>Link<input id="link-url" placeholder="https://example.com" /></label>
    <button id="send-link-btn">Send link</button>
    <label>Photo<input id="photo-file" type="file" accept="image/*" /></label>
    <button id="send-photo-btn">Send photo</button>
  </div>

  <div id="status"></div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
