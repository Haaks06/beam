# fly.toml app configuration file generated for beam-wckn2w on 2026-07-02T00:53:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'beam-wckn2w'
primary_region = 'ams'

[build]

[env]
  CORS_ORIGIN = ''
  DB_PATH = '/data/relay.sqlite'
  INBOX_LIMIT_PER_HOUR = '5'
  MAX_UPLOAD_BYTES = '15728640'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'beam_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
