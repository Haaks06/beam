# Matches the app Fly's dashboard "Deploy from GitHub" auto-created
# (beam-wckn2w.fly.dev). Region matches where its persistent volume
# (beam_data) already lives — volumes are region-locked, so this must stay
# "ams" unless the volume is recreated elsewhere.
app = "beam-wckn2w"
primary_region = "ams"

[build]

[env]
  DB_PATH = "/data/relay.sqlite"
  UPLOAD_DIR = "/data/uploads"
  MAX_UPLOAD_BYTES = "15728640"
  CORS_ORIGIN = ""
  # The URL every pairing link/QR code points at (see
  # relay-server/lib/publicRelayUrl.js) -- fixed here rather than derived
  # from whatever hostname a request arrives on, which used to leak the
  # raw fly.dev address into every QR code. TODO once app.beamlot.com's
  # DNS is live and its cert (already requested via `fly certs add`)
  # verifies: change this to "https://app.beamlot.com" and redeploy --
  # that also turns on index.js's fly.dev -> canonical-host redirect.
  PUBLIC_RELAY_URL = "https://beam-wckn2w.fly.dev"
  # Renamed from INBOX_LIMIT_PER_HOUR during the rate-limit redesign (see
  # relay-server/index.js) -- the old name is silently ignored by the code
  # now, so this stayed unset in production and fell back to the code
  # default. Set explicitly here so the deployed limit is intentional, not
  # an accident of a stale var name.
  INBOX_LIMIT_WINDOW_MS = "600000"
  INBOX_LIMIT_PER_WINDOW = "200"

[[mounts]]
  source = "beam_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # The whole point of moving off Render's free tier: never scale to zero,
  # so pairings survive idle periods instead of being wiped on every
  # sleep/wake cycle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
