<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pair a device — Beam</title>
  <link rel="stylesheet" href="beam-theme.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      -webkit-app-region: drag;
    }
    body {
      position: relative;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6);
    }
    body::before {
      content: '';
      position: absolute;
      inset: -20% -60% auto auto;
      width: 380px;
      height: 380px;
      background: url('../assets/beam-logo.png') center / cover no-repeat;
      opacity: 0.14;
      mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      width: 300px;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 0.45s var(--ease-out-expo) 0.1s forwards;
    }
    h1 {
      margin: 0 0 4px;
      font-family: var(--font-display);
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    p.subtitle { margin: 0 0 22px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()" title="Close">&times;</button>
  <main>
    <h1>Pair a device</h1>
    <p class="subtitle">Scan with your phone, or enter the code manually</p>
    <div class="scan-frame" id="frame">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <span class="scanline"></span>
      <img class="qr" id="qr" src="" alt="QR code" />
    </div>
    <div class="code" id="code">------</div>
    <hr />
    <div class="status" id="status">Generating code…</div>
    <hr />
    <p class="join-label">Setting up this PC to join a different inbox instead?</p>
    <div class="join-row">
      <input id="claim-code-input" placeholder="Their code" maxlength="6" />
      <button id="claim-btn">Join</button>
    </div>
  </main>
  <script src="pairing.js"></script>
</body>
</html>
