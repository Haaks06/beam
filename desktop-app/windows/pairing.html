<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pair a device — Beam</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #191c22;
      --fg: #f2f3f5;
      --muted: #9aa1ac;
      --accent: #2563eb;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 320px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
    .subtitle { margin: 0 0 20px; font-size: 13px; color: var(--muted); }
    img.qr {
      width: 240px;
      height: 240px;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: block;
      margin: 0 auto;
    }
    .code {
      font-size: 30px;
      letter-spacing: 6px;
      font-weight: 700;
      margin: 16px 0 6px;
    }
    .hint { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .status {
      margin-top: 16px;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Scan to add a device</h2>
    <p class="subtitle">Point your phone's camera at this code</p>
    <img class="qr" id="qr" src="" alt="QR code" />
    <div class="code" id="code">------</div>
    <p class="hint">Or open the Beam web app and enter this code by hand.</p>
    <div class="status" id="status">Generating code…</div>
  </div>
  <script src="pairing.js"></script>
</body>
</html>
