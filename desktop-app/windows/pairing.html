<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pair a device — Beam</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #6b6b6b;
      --line: #232323;
      --success: #6bcf9a;
      --error: #e17a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    main {
      width: 300px;
      text-align: center;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    p.subtitle { margin: 0 0 24px; font-size: 13px; color: var(--muted); }
    img.qr {
      width: 200px;
      height: 200px;
      background: #fff;
      display: block;
      margin: 0 auto;
    }
    .code {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 26px;
      letter-spacing: 0.3em;
      font-weight: 500;
      margin: 20px 0 0;
      padding-left: 0.3em; /* visually re-center after letter-spacing */
    }
    hr { border: none; border-top: 1px solid var(--line); margin: 20px 0; }
    .status {
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
  </style>
</head>
<body>
  <main>
    <h1>Pair a device</h1>
    <p class="subtitle">Scan with your phone, or enter the code manually</p>
    <img class="qr" id="qr" src="" alt="QR code" />
    <div class="code" id="code">------</div>
    <hr />
    <div class="status" id="status">Generating code…</div>
  </main>
  <script src="pairing.js"></script>
</body>
</html>
