<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Beam</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #6b6b6b;
      --line: #232323;
      --success: #6bcf9a;
      --error: #e17a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    video.intro {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
      background: #000;
    }
    main { width: 300px; text-align: center; padding: 20px 0; }
    .wordmark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    p.intro {
      margin: 0 0 24px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    img.qr {
      width: 190px;
      height: 190px;
      background: #fff;
      display: block;
      margin: 0 auto;
    }
    .code {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 24px;
      letter-spacing: 0.3em;
      font-weight: 500;
      margin: 18px 0 0;
      padding-left: 0.3em;
    }
    hr { border: none; border-top: 1px solid var(--line); margin: 18px 0; }
    .status {
      min-height: 32px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
  </style>
</head>
<body>
  <video class="intro" src="../assets/intro.mp4" autoplay muted playsinline></video>
  <main>
    <div class="wordmark">Beam</div>
    <p class="intro">Runs quietly in the background and saves links and photos you share from your phone straight to this PC. Scan to connect your phone now.</p>
    <img class="qr" id="qr" src="" alt="QR code" />
    <div class="code" id="code">------</div>
    <hr />
    <div class="status" id="status">Generating code…</div>
  </main>
  <script src="pairing.js"></script>
</body>
</html>
