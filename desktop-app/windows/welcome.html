<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Welcome to Beam</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #191c22;
      --fg: #f2f3f5;
      --muted: #9aa1ac;
      --accent: #2563eb;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 340px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    .badge {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; font-weight: 700; }
    .intro { margin: 0 0 22px; font-size: 13px; color: var(--muted); line-height: 1.5; }
    img.qr {
      width: 220px;
      height: 220px;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: block;
      margin: 0 auto;
    }
    .code {
      font-size: 28px;
      letter-spacing: 6px;
      font-weight: 700;
      margin: 16px 0 6px;
    }
    .hint { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .status {
      margin-top: 16px;
      min-height: 32px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">📡</div>
    <h1>Welcome to Beam</h1>
    <p class="intro">
      Beam runs quietly in the background and saves links and photos you
      share from your phone straight to this PC. Scan this code with your
      phone to connect it now.
    </p>
    <img class="qr" id="qr" src="" alt="QR code" />
    <div class="code" id="code">------</div>
    <p class="hint">Or open the Beam web app and enter this code by hand.</p>
    <div class="status" id="status">Generating code…</div>
  </div>
  <script src="pairing.js"></script>
</body>
</html>
