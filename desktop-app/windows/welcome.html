<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Beam</title>
  <link rel="stylesheet" href="beam-theme.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      -webkit-app-region: drag;
    }
    body {
      position: relative;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6);
    }
    /* Brand art bleeding from the top-right corner, low opacity — the same
       treatment as the web client, so the first thing anyone sees on either
       surface is unmistakably the same product. */
    body::before {
      content: '';
      position: absolute;
      inset: -20% -60% auto auto;
      width: 420px;
      height: 420px;
      background: url('../assets/beam-logo.png') center / cover no-repeat;
      opacity: 0.14;
      mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    video.intro {
      position: relative;
      z-index: 1;
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      display: block;
      background: #000;
    }
    main {
      position: relative;
      z-index: 1;
      width: 300px;
      text-align: center;
      padding: 18px 0 20px;
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 0.5s var(--ease-out-expo) 0.15s forwards;
    }
    .wordmark { justify-content: center; margin-bottom: 6px; }
    p.intro {
      margin: 0 0 22px;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* -- account section: not in the shared theme (welcome.html-only) -- */
    .toggle-link {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }
    .toggle-link:hover { color: var(--fg); }
    #account-section { display: none; margin-top: 12px; -webkit-app-region: no-drag; text-align: left; }
    .account-mode-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      background: var(--surface);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      flex: 1;
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 0;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .mode-btn.active { background: var(--violet-600); color: var(--fg); }
    .mode-btn:hover:not(.active) { color: var(--fg); }
    #account-section input {
      width: 100%;
      font-size: 13px;
      padding: 7px 9px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--fg);
      box-sizing: border-box;
      transition: border-color 0.18s ease;
    }
    #account-section input:focus { outline: none; border-color: var(--violet-500); }
    .password-field { position: relative; }
    .password-field input { padding-right: 54px; }
    .password-toggle {
      -webkit-app-region: no-drag;
      position: absolute;
      right: 5px;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      padding: 0 8px;
      margin: 0 0 8px;
    }
    .password-toggle:hover { color: var(--violet-300); }
    .account-submit {
      width: 100%;
      margin-top: 2px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 0;
      background: var(--beam-gradient);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.12s ease;
      -webkit-app-region: no-drag;
    }
    .account-submit:hover { opacity: 0.92; }
    .account-submit:active { transform: scale(0.98); }
    .account-submit:disabled { opacity: 0.5; cursor: default; transform: none; }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()" title="Close">&times;</button>
  <video class="intro" src="../assets/intro.mp4" autoplay muted playsinline></video>
  <main>
    <div class="wordmark"><img src="../assets/icon-48.png" alt="" width="18" height="18" />Beam</div>
    <p class="intro">Runs quietly in the background and lands links and photos you share from your phone straight onto this PC. Scan to connect your phone now.</p>
    <div class="scan-frame" id="frame">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <span class="scanline"></span>
      <img class="qr" id="qr" src="" alt="QR code" />
    </div>
    <div class="code" id="code">------</div>
    <hr />
    <div class="status" id="status">Generating code…</div>
    <hr />
    <p class="join-label">Already set up on another device? Join it instead:</p>
    <div class="join-row">
      <input id="claim-code-input" placeholder="Their code" maxlength="6" />
      <button id="claim-btn">Join</button>
    </div>
    <hr />
    <button id="toggle-account-btn" class="toggle-link">Use a username &amp; password instead</button>
    <div id="account-section">
      <div class="account-mode-toggle">
        <button type="button" id="mode-signup-btn" class="mode-btn active">Sign up</button>
        <button type="button" id="mode-login-btn" class="mode-btn">Log in</button>
      </div>
      <input id="account-username" placeholder="Username" autocomplete="username" />
      <div class="password-field">
        <input id="account-password" type="password" placeholder="Password (8+ characters)" autocomplete="current-password" />
        <button type="button" id="toggle-password-btn" class="password-toggle">Show</button>
      </div>
      <button id="account-submit-btn" class="account-submit">Create account</button>
    </div>
  </main>
  <script src="pairing.js"></script>
</body>
</html>
