<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Beam</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #6b6b6b;
      --line: #202020;
      --hover: #161616;
      --success: #6bcf9a;
      --error: #e17a7a;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: transparent;
      color: var(--fg);
      font-size: 13px;
      overflow: hidden;
      user-select: none;
    }
    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: scale(0.97) translateY(4px);
      animation: reveal 0.2s ease forwards;
    }
    @keyframes reveal {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* The header is the drag handle — grab anywhere on it to move the Hub
       wherever you want; it no longer has to stay pinned to the tray. */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      -webkit-app-region: drag;
      cursor: grab;
    }
    .wordmark { font-weight: 700; font-size: 13px; letter-spacing: 0.02em; }
    .pending-badge {
      display: none;
      -webkit-app-region: no-drag;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 6px;
      margin-left: 4px;
      cursor: pointer;
      vertical-align: middle;
    }
    .status { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.25s ease;
    }
    .status.connected .dot {
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(107, 207, 154, 0.6);
      animation: pulse 2s ease-out infinite;
    }
    .status.disconnected .dot { background: var(--error); }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(107, 207, 154, 0.5); }
      70% { box-shadow: 0 0 0 6px rgba(107, 207, 154, 0); }
      100% { box-shadow: 0 0 0 0 rgba(107, 207, 154, 0); }
    }

    #items {
      flex: 1;
      overflow-y: auto;
      min-height: 60px;
    }
    .empty {
      padding: 28px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.15s ease;
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .item:hover { background: var(--hover); }
    .item .kind { color: var(--muted); font-size: 10px; width: 34px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
    .item .content {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .item .action {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.15s ease;
    }
    .item.copied .action { color: var(--success); }

    footer {
      display: flex;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    footer button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      padding: 10px 2px;
      cursor: pointer;
      font-family: inherit;
      border-right: 1px solid var(--line);
      transition: color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    footer button:last-child { border-right: none; }
    footer button:hover { color: var(--fg); background: var(--hover); }
    footer button:active { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <span class="wordmark">Beam <span id="pending-badge" class="pending-badge"></span></span>
    <span class="status" id="status"><span class="dot"></span><span id="status-text">connecting…</span></span>
  </header>
  <div id="items">
    <div class="empty">Nothing shared yet</div>
  </div>
  <footer>
    <button id="pair-btn" title="Add another of your own devices">Pair device</button>
    <button id="web-panel-btn" title="Manage friends, send from this PC">Web</button>
    <button id="photos-btn">Photos</button>
    <button id="links-btn">Links</button>
    <button id="quit-btn">Quit</button>
  </footer>
  <script src="hub.js"></script>
</body>
</html>
