<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Beam</title>
  <link rel="stylesheet" href="beam-theme.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: var(--font-body);
      background: transparent;
      color: var(--fg);
      font-size: 13px;
      overflow: hidden;
      user-select: none;
    }
    body {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transform: scale(0.97) translateY(4px);
      animation: reveal-hub 0.2s var(--ease-out-expo) forwards;
    }
    @keyframes reveal-hub {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    body::before {
      content: '';
      position: absolute;
      inset: -40% -30% auto auto;
      width: 260px;
      height: 260px;
      background: url('../assets/beam-logo.png') center / cover no-repeat;
      opacity: 0.12;
      mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 70% 30%, black 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* The header is the drag handle — grab anywhere on it to move the Hub
       wherever you want; it no longer has to stay pinned to the tray. */
    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      -webkit-app-region: drag;
      cursor: grab;
    }
    .pending-badge {
      display: none;
      -webkit-app-region: no-drag;
      background: var(--beam-gradient);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 6px;
      margin-left: 6px;
      cursor: pointer;
      vertical-align: middle;
    }

    /* Profile avatar: a circular initial-badge in the header that opens
       the slide-out identity panel. It's the only place in the whole
       desktop app that shows who you're signed in as once the welcome
       window closes, so it needs to be visible at a glance, not tucked
       into a menu. */
    #profile-btn {
      -webkit-app-region: no-drag;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--beam-gradient);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-body);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 8px;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }
    #profile-btn:hover { transform: scale(1.08); }
    #profile-btn:active { transform: scale(0.96); }

    #profile-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 2;
    }
    #profile-backdrop.open { opacity: 1; pointer-events: auto; }

    #profile-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 250px;
      background: var(--bg);
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 40px rgba(0, 0, 0, 0.4);
      transform: translateX(100%);
      transition: transform 0.22s var(--ease-out-expo);
      z-index: 3;
      display: flex;
      flex-direction: column;
    }
    #profile-panel.open { transform: translateX(0); }
    #profile-panel .profile-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 14px;
      border-bottom: 1px solid var(--line);
    }
    #profile-panel .profile-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--beam-gradient);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #profile-panel .profile-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #profile-panel .profile-kind {
      font-size: 11px;
      color: var(--muted);
    }
    #profile-panel .profile-body {
      flex: 1;
      padding: 12px 14px;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
    }
    #profile-close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      margin-left: auto;
      padding: 4px;
      flex-shrink: 0;
    }
    #profile-close-btn:hover { color: var(--fg); }
    #profile-logout-btn {
      -webkit-app-region: no-drag;
      margin: 0 14px 14px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: none;
      color: var(--fg);
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    #profile-logout-btn:hover { background: var(--surface-hover); border-color: var(--muted); }

    #items {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      min-height: 60px;
    }
    .empty {
      padding: 30px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .item.land-in { animation: land-in 0.3s var(--ease-spring) both, landed-flash 1s ease-out both; }
    .item:hover { background: var(--surface-hover); }
    .item .kind { color: var(--muted); font-family: var(--font-mono); font-size: 10px; width: 34px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
    .item .content {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .item .action {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.15s ease;
    }
    .item.copied .action { color: var(--violet-300); }

    footer {
      position: relative;
      z-index: 1;
      display: flex;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    footer button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 9.5px;
      padding: 9px 2px 8px;
      cursor: pointer;
      font-family: var(--font-body);
      border-right: 1px solid var(--line);
      transition: color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    footer button svg { width: 15px; height: 15px; flex-shrink: 0; }
    footer button:last-child { border-right: none; }
    footer button:hover { color: var(--fg); background: var(--surface-hover); }
    footer button:active { color: var(--violet-300); }
  </style>
</head>
<body>
  <header>
    <button id="profile-btn" title="Your account"></button>
    <span class="wordmark"><img src="../assets/icon-48.png" alt="" width="18" height="18" />Beam<span id="pending-badge" class="pending-badge"></span></span>
    <span class="signal" id="status"><span class="dot"></span><span id="status-text">connecting…</span></span>
  </header>
  <div id="items">
    <div class="empty">Nothing beamed yet</div>
  </div>
  <div id="profile-backdrop"></div>
  <div id="profile-panel">
    <div class="profile-header">
      <span class="profile-avatar" id="profile-avatar"></span>
      <span>
        <div class="profile-name" id="profile-name">—</div>
        <div class="profile-kind" id="profile-kind"></div>
      </span>
      <button id="profile-close-btn" title="Close">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="profile-body" id="profile-body"></div>
    <button id="profile-logout-btn">Log out</button>
  </div>
  <footer>
    <button id="pair-btn" title="Add another of your own devices">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="9" height="16" rx="2"></rect><path d="M18 8h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2v-2"></path></svg>
      Pair
    </button>
    <button id="web-panel-btn" title="Manage friends, send from this PC">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"></path></svg>
      Web
    </button>
    <button id="photos-btn" title="Open the photos folder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><circle cx="8.5" cy="9.5" r="1.5"></circle><path d="m21 15-5-5L5 20"></path></svg>
      Photos
    </button>
    <button id="links-btn" title="Open the links folder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11.5 4.5"></path><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07l1.36-1.36"></path></svg>
      Links
    </button>
    <button id="quit-btn" title="Quit Beam">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
      Quit
    </button>
  </footer>
  <script src="hub.js"></script>
</body>
</html>
