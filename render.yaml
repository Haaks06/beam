services:
  - type: web
    name: share-to-pc-relay
    runtime: node
    plan: free
    rootDir: .
    # Render sets NODE_ENV=production during the build by default, which
    # makes a plain "npm install" skip devDependencies (vite, needed here
    # to build the web client) — explicitly include them for the build step.
    buildCommand: npm install --include=dev && npm run build:web
    startCommand: npm run start:relay
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.5.0
      - key: DB_PATH
        value: ./data/relay.sqlite
      - key: UPLOAD_DIR
        value: ./data/uploads
      - key: MAX_UPLOAD_BYTES
        value: 15728640
      - key: CORS_ORIGIN
        value: ""
      - key: INBOX_LIMIT_PER_HOUR
        value: 5
